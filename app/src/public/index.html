<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban AI Board</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <header class="page-header">
    <div>
      <h1>Kanban Board with AI-Assisted Assignee Recommendation</h1>
    </div>
  </header>

  <main class="layout">
    <section class="sidebar">
      <div class="panel">
        <h2 id="form-title">Create Ticket</h2>
        <form id="ticket-form">
          <input type="hidden" id="ticket-id" />
          <label>
            Title
            <input id="title" name="title" type="text" required />
          </label>
          <label>
            Description
            <textarea id="description" name="description" rows="4"></textarea>
          </label>
          <label>
            Priority
            <select id="priority" name="priority" required>
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </label>
          <label>
            Label
            <select id="label" name="label" required>
              <option value="backend">Backend</option>
              <option value="frontend">Frontend</option>
              <option value="devops">DevOps</option>
              <option value="bugfix">Bugfix</option>
            </select>
          </label>
          <label>
            Due date
            <input id="dueDate" name="dueDate" type="date" />
          </label>
          <label>
            Assignee
            <select id="assigneeId" name="assigneeId">
              <option value="">Unassigned</option>
            </select>
          </label>
          <div class="form-actions">
            <button type="button" id="recommend-btn">Recommend assignee</button>
            <button type="submit">Save</button>
            <button type="button" id="cancel-edit-btn" class="secondary">Cancel</button>
          </div>
        </form>
      </div>

      <div class="panel" id="recommendation-panel">
        <h2>Recommendation</h2>
        <p class="muted">No recommendation yet.</p>
      </div>
    </section>

    <section class="board" id="board"></section>
  </main>

  <script src="/js/state.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/form.js"></script>
  <script src="/js/recommendation.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
